name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libxkbcommon-dev \
            libwayland-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NAME="bluetooth-monitor-${VERSION}-linux-x86_64"
          mkdir -p dist
          cp target/release/bluetooth-monitor "dist/${NAME}"
          strip "dist/${NAME}" || true
          cd dist
          tar -czvf "${NAME}.tar.gz" "${NAME}"
          sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          ls -la

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: dist/*

  release:
    name: Publish GitHub Release
    needs: [build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Assemble release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md
          awk -v v="[${VERSION}]" '
            $0 ~ "^## " v { flag=1; next }
            /^## / && flag { flag=0 }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog section for ${VERSION}, using tag message." > release-notes.md
          fi
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist/**/*
          draft: false
          prerelease: false
